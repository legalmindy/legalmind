ext {
    // Capacitor 8 / cordova-android 14.0.1 officially require minSdkVersion 24, and Gradle's
    // manifest merger rejects anything lower with a hard build error by default. Per explicit
    // product requirement, compatibility with older devices (Android 5.0/5.1) is prioritized over
    // that official floor, so the merger conflict is force-resolved via
    // tools:overrideLibrary in AndroidManifest.xml (see android/app/src/main/AndroidManifest.xml).
    // RISK: this is an unsupported configuration — Capacitor/cordova code paths that assume API 24+
    // could misbehave on API 21-23 devices. Keep an eye on crash reports from that device range.
    minSdkVersion = 21
    compileSdkVersion = 36
    targetSdkVersion = 36
    androidxActivityVersion = '1.11.0'
    androidxAppCompatVersion = '1.7.1'
    androidxCoordinatorLayoutVersion = '1.3.0'
    androidxCoreVersion = '1.17.0'
    androidxFragmentVersion = '1.8.9'
    coreSplashScreenVersion = '1.2.0'
    androidxWebkitVersion = '1.14.0'
    junitVersion = '4.13.2'
    androidxJunitVersion = '1.3.0'
    androidxEspressoCoreVersion = '3.7.0'
    cordovaAndroidVersion = '14.0.1'
}