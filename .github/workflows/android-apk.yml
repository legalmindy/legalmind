name: Build & Publish Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build

      - name: Strip stale APK/AAB from web build before Capacitor sync
        # public/downloads/*.apk is copied into dist/ by Vite for the website's own download link.
        # If left in dist/, `cap sync` would embed the *previous* APK as a WebView asset inside the
        # *new* one, snowballing app size every run and producing a corrupt/unparseable APK.
        run: rm -f dist/downloads/*.apk dist/downloads/*.aab

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Resolve debug keystore path
        # actions/cache does not expand "~" (confirmed via CI log: "Path Validation Error: Path(s)
        # specified in the action for caching do(es) not exist, hence no cache is being saved" — the
        # cache below was a silent no-op every run despite looking correctly configured, so every
        # build kept signing with a brand new random debug cert). Resolve $HOME to an absolute path
        # first and reuse that for both the cache step and mkdir below.
        run: echo "DEBUG_KEYSTORE_PATH=$HOME/.android/debug.keystore" >> "$GITHUB_ENV"

      - name: Restore persistent debug keystore
        # GitHub-hosted runners are ephemeral: with no cache, every run's debug.keystore would be
        # freshly (re)generated with a *different* random signing certificate. Installing a newer
        # APK signed with a different cert over an already-installed older one is rejected by
        # Android (surfaces to users as "There was a problem parsing the package"). Caching the
        # keystore with a static key makes every build share the same debug signing identity so
        # users can always update in place.
        uses: actions/cache@v4
        with:
          path: ${{ env.DEBUG_KEYSTORE_PATH }}
          key: android-debug-keystore-v1

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean build outputs
        working-directory: android
        run: ./gradlew clean --no-daemon --stacktrace

      - name: Build debug APK (full warnings surfaced)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all

      - name: Debug - locate actual debug keystore file
        run: |
          echo "Expected path: $DEBUG_KEYSTORE_PATH"
          ls -la "$HOME/.android/" 2>&1 || echo "$HOME/.android does not exist"
          find / -xdev -iname "debug.keystore" 2>/dev/null || true

      - name: Validate release build path (R8/ProGuard/manifest only, not published)
        # Distribution still uses the debug build (see keystore.properties.sample / prior decision
        # to avoid committing a real release signing key to this public repo). This step only proves
        # the release variant's manifest merge + R8/ProGuard shrinking succeed on their own, so any
        # future switch to real release signing doesn't silently ship a broken build.
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all
        continue-on-error: true

      - name: Package release artifact
        id: prep
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + PATCH))
          FILENAME="legalmind-yemen-${VERSION}.apk"

          mkdir -p public/downloads
          rm -f public/downloads/*.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "public/downloads/${FILENAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Update release manifest
        run: |
          node scripts/update-release-manifest.mjs \
            "${{ steps.prep.outputs.version }}" \
            "${{ steps.prep.outputs.version_code }}" \
            "${{ steps.prep.outputs.filename }}"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.filename }}
          path: public/downloads/${{ steps.prep.outputs.filename }}
          retention-days: 30

      - name: Commit APK and manifest back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads public/app-release.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "chore(android): publish APK v${{ steps.prep.outputs.version }} [skip ci]"
          git push
