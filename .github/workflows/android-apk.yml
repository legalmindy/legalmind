name: Build & Publish Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets
        run: npm run build

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform & build-tools
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0" > /dev/null

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Package release artifact
        id: prep
        run: |
          set -e
          VERSION=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          VERSION_CODE=$((MAJOR * 100 + MINOR * 10 + PATCH))
          FILENAME="legalmind-yemen-${VERSION}.apk"

          mkdir -p public/downloads
          rm -f public/downloads/*.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "public/downloads/${FILENAME}"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"

      - name: Update release manifest
        run: |
          node scripts/update-release-manifest.mjs \
            "${{ steps.prep.outputs.version }}" \
            "${{ steps.prep.outputs.version_code }}" \
            "${{ steps.prep.outputs.filename }}"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.filename }}
          path: public/downloads/${{ steps.prep.outputs.filename }}
          retention-days: 30

      - name: Commit APK and manifest back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads public/app-release.json
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "chore(android): publish APK v${{ steps.prep.outputs.version }} [skip ci]"
          git push
